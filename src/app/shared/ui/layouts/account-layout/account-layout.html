<div class="flex h-screen overflow-hidden bg-gray-50">
    <!-- Sidebar overlay (mobile) -->
    @if (sidebarOpen()) {
        <div class="fixed inset-0 z-30 bg-black/40 lg:hidden" (click)="toggleSidebar()"></div>
    }

    <!-- Sidebar -->
    <aside
            class="fixed inset-y-0 left-0 z-40 flex w-64 flex-col border-r border-gray-200 bg-white transition-transform lg:static lg:translate-x-0"
            [class.-translate-x-full]="!sidebarOpen()"
            [class.translate-x-0]="sidebarOpen()"
    >
        <!-- Logo -->
        <div class="flex h-16 items-center gap-2 border-b border-gray-200 px-6">
            <a routerLink="/" class="text-lg font-bold tracking-tight text-gray-900">RF-Protocol</a>
        </div>

        <!-- Nav -->
        <nav class="flex-1 space-y-1 px-3 py-4">
            <a
                    routerLink="/account/my-researches"
                    routerLinkActive="bg-indigo-50 text-indigo-700"
                    [routerLinkActiveOptions]="{exact: true}"
                    class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100"
            >
                <span class="text-lg">📋</span>
                Мои проекты
            </a>

            @if (auth.canReview()) {
                <a
                        routerLink="/account/researches/pending-review"
                        routerLinkActive="bg-indigo-50 text-indigo-700"
                        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100"
                >
                    <span class="text-lg">⚖️</span>
                    Projects to review
                </a>
            }

            <a
                    routerLink="/account/new"
                    routerLinkActive="bg-indigo-50 text-indigo-700"
                    class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-100"
            >
                <span class="text-lg">➕</span>
                Новый проект
            </a>
        </nav>

        <!-- User -->
        <div class="border-t border-gray-200 px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex flex-col truncate">
                    <div class="truncate text-sm font-semibold text-gray-900">
                        {{ auth.user()?.email }}
                    </div>
                    <div class="text-[10px] text-gray-400 uppercase tracking-tighter">
                        ID: {{ auth.user()?.id }}
                    </div>
                </div>
                <button
                        class="cursor-pointer rounded-md px-3 py-1 text-xs font-medium text-gray-500 transition hover:bg-gray-100 hover:text-gray-900"
                        (click)="auth.logout()"
                >
                    Выйти
                </button>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <div class="flex flex-1 flex-col overflow-hidden">
        <!-- Top bar (mobile) -->
        <header class="flex h-16 items-center gap-4 border-b border-gray-200 bg-white px-4 lg:hidden">
            <button
                    class="cursor-pointer rounded-md p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-900"
                    (click)="toggleSidebar()"
            >
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <span class="text-lg font-bold text-gray-900">RF-Protocol</span>
        </header>

        <!-- Page content -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <router-outlet/>
        </main>
    </div>
</div>
