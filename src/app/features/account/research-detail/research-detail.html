<div>
    <!-- Tab bar + action buttons -->
    <div class="mx-auto mb-8 flex max-w-4xl items-center border-b border-gray-200">
        <div class="flex flex-1">
            @for (t of tabs; track t.key) {
                <button
                        class="cursor-pointer border-b-2 px-5 py-3 text-sm font-medium transition disabled:cursor-not-allowed disabled:opacity-50"
                        [class]="tab() === t.key
            ? 'border-indigo-600 text-indigo-600'
            : 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'"
                        (click)="tab.set(t.key)"
                        [disabled]="isTabDisabled(t.key)"
                >
                    {{ t.label }}
                </button>
            }
        </div>
        <div class="flex shrink-0 items-center gap-2 pb-px">
            @if (showSetSupervisor()) {
                <button
                        class="cursor-pointer rounded-lg bg-indigo-600 px-4 py-1.5 text-sm font-medium text-white transition hover:bg-indigo-700"
                        (click)="setSupervisor()"
                >Вести Проект
            </button>
            }

            @if (showPublish()) {
                <button
                        class="cursor-pointer rounded-lg bg-green-600 px-4 py-1.5 text-sm font-medium text-white transition hover:bg-green-700"
                        (click)="publish()"
                >Опубликовать
                </button>
            }

            <button
                    class="cursor-pointer rounded-lg border border-gray-300 px-4 py-1.5 text-sm font-medium text-gray-700 transition hover:bg-gray-100"
                    (click)="cancel()"
            >{{ publicMode() ? 'Назад' : 'Отмена' }}
            </button>
    </div>
</div>

    <!-- Tab content -->
    @if (tab() === 'project') {
        <rf-project-tab
                [(title)]="title"
                [(hypothesis)]="hypothesis"
                [(description)]="description"
                [(protocolPrimaryOutcome)]="protocolPrimaryOutcome"
                [(protocolSampleSizeJustification)]="protocolSampleSizeJustification"
                [(protocolStatisticalMethod)]="protocolStatisticalMethod"
                [(protocolRandomizationMethod)]="protocolRandomizationMethod"
                [(protocolBlindingDetails)]="protocolBlindingDetails"
                [(protocolInterventionDescription)]="protocolInterventionDescription"
                [(protocolInclusionCriteria)]="protocolInclusionCriteria"
                [(protocolExclusionCriteria)]="protocolExclusionCriteria"
                [(protocolEarlyStoppingCriteria)]="protocolEarlyStoppingCriteria"
                [(primaryOutcomes)]="primaryOutcomes"
                [(trackedParameters)]="trackedParameters"
                [isEditMode]="isEditMode()"
                [readonly]="publicMode() || !isOwner()"
                [(isSaving)]="isSaving"
                (save)="saveProject()"
        />
    }

    @if (tab() === 'lines') {
        <rf-lines-tab
                [researchId]="this.editingId() ?? 0"
                [(lines)]="lines"
                [subjects]="mentionableSubjects()"
                [mentionableArtifacts]="mentionableArtifacts()"
                [trackedParameters]="trackedParameterInfos()"
                [readonly]="publicMode() || !isOwner()"
        />
    }

    @if (tab() === 'groups') {
        <rf-groups-tab
                [(groups)]="groups"
                [trackedParameters]="trackedParameters()"
                [readonly]="publicMode() || !isOwner()"
        />
    }

    @if (tab() === 'review') {
        <rf-review-tab
                [title]="title()"
                [hypothesis]="hypothesis()"
                [description]="description()"
                [protocolPrimaryOutcome]="protocolPrimaryOutcome()"
                [protocolSampleSizeJustification]="protocolSampleSizeJustification()"
                [protocolStatisticalMethod]="protocolStatisticalMethod()"
                [protocolRandomizationMethod]="protocolRandomizationMethod()"
                [protocolBlindingDetails]="protocolBlindingDetails()"
                [protocolInterventionDescription]="protocolInterventionDescription()"
                [protocolInclusionCriteria]="protocolInclusionCriteria()"
                [protocolExclusionCriteria]="protocolExclusionCriteria()"
                [protocolEarlyStoppingCriteria]="protocolEarlyStoppingCriteria()"
                [primaryOutcomes]="primaryOutcomes()"
                [trackedParameters]="trackedParameters()"
                [lines]="lines()"
                [groups]="groups()"
                [isEditMode]="isEditMode()"
        />
    }
</div>
